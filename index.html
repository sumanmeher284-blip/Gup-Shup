            background: rgba(255, 255, 255, 0.4); /* हल्का ट्रांसपेरेंट */
            backdrop-filter: blur(20px); /* ग्लास ब्लर इफेक्ट */
            padding: 40px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            width: 320px;
            text-align: center;
        }

        .logo { width: 80px; margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 20px; }
        input {
            width: 100%; padding: 15px; margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 12px; box-sizing: border-box;
        }
        .btn {
            width: 100%; padding: 15px; background: #33b5e5;
            color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer;
        }
        .footer { font-size: 14px; margin-top: 20px; }
        .footer a { color: #33b5e5; text-decoration: none; font-weight: bold; }

<body>

  <div class="glass-card">
    <img src="logo.png" alt="Logo" class="logo">
    <h1>Login to Your Account</h1>
    
    <input type="text" id="email" placeholder="Email or Phone Number">
    <input type="password" id="password" placeholder="Password">

    <button class="btn" id="loginBtn">Log In</button>

    <div class="footer">
      <a href="Forgetpassword.html">Forgot Password?</a>
      <p style="margin-top:10px;">
        Don't have an account? <a href="sign up.html">Sign Up</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";

    // Firebase Config (जो आपने दी थी)
    const firebaseConfig = {
      apiKey: "AIzaSyCKmCKZ-aTnSCokuMQ7Mz2mgRl7MuyfRPw",
      authDomain: "nexusgram-1.firebaseapp.com",
      projectId: "nexusgram-1",
      storageBucket: "nexusgram-1.firebasestorage.app",
      messagingSenderId: "861550995018",
      appId: "1:861550995018:web:e246dbf13f091ac55de8b3",
      measurementId: "G-7QR449644N"
    };

    // Initialize
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const analytics = getAnalytics(app);
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        await signInWithEmailAndPassword(auth, email, password);
        alert("Login successful!");
        window.location.href = 'home Feed.html'; // यहाँ अपने अगले पेज का नाम लिखें
      } catch (error) {
        alert("Error: " + error.message);
      }
    });
  </script>
</body>
