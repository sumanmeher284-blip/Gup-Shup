<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gup Shup Home</title>
    <style>
        body { margin: 0; font-family: sans-serif; }
        .navbar { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: white; padding: 10px 0; border-top: 1px solid #ddd; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; cursor: pointer; }
        .plus-icon { font-size: 20px; font-weight: bold; }
        
        /* Containers */
        .page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 999; }
        #shorts-container { background: black; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .reel-video { width: 100%; height: 100vh; scroll-snap-align: start; object-fit: cover; }
    </style>
</head>
<body>

    <h1>Home Page</h1>
    <div id="feed">Your posts will appear here...</div>

    <div class="navbar">
        <div class="nav-item">🏠<br>Home</div>
        <div class="nav-item" onclick="openPage('shorts-container')">⚡<br>Shorts</div>
        <div class="nav-item plus-icon" onclick="openPage('creator-container')">+<br><span style="font-size: 10px;">Create</span></div>
        <div class="nav-item">👤<br>Profile</div>
    </div>

    <div id="creator-container" class="page">
        <button onclick="closePage('creator-container')" style="position: absolute; top: 10px; right: 10px;">Close</button>
        <div style="height: 60%; background: black;"><video id="video" autoplay playsinline style="width:100%; height:100%;"></video></div>
        <div style="height: 40%; padding: 10px;"><h3>Gallery</h3></div>
    </div>

    <div id="shorts-container" class="page">
        <button onclick="closePage('shorts-container')" style="position: absolute; top: 10px; left: 10px; z-index: 1000;">Back</button>
        <div class="reel-video" style="background: grey;">Reel 1</div>
        <div class="reel-video" style="background: blue;">Reel 2</div>
    </div>

    <script>
        function openPage(id) {
            document.getElementById(id).style.display = 'block';
            if(id === 'creator-container') startCamera();
        }

        function closePage(id) {
            document.getElementById(id).style.display = 'none';
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('video').srcObject = stream;
            } catch (err) { console.error(err); }
        }
    </script>
</body>
</html>
