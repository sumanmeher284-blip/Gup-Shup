<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .profile-pic { width: 100px; height: 100px; background: #ddd; border-radius: 50%; margin: 0 auto 10px; }
        .username { font-size: 20px; font-weight: bold; }
        .bio { color: #555; margin-bottom: 15px; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; border-top: 1px solid #eee; border-bottom: 1px solid #eee; padding: 10px 0; }
        .stat-item { font-weight: bold; }
        .button-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .edit-btn { background: #007BFF; color: white; }
        .msg-btn { background: #e0e0e0; color: black; }
        .tab-bar { display: flex; justify-content: space-around; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
    </style>
</head>
<body>

    <div class="profile-pic"></div>
    <div class="username">John Doe</div>
    <div class="bio">Believer in peace and happiness! ✌️</div>

    <div class="stats">
        <div class="stat-item">15<br>Posts</div>
        <div class="stat-item">1.2k<br>Followers</div>
        <div class="stat-item">200<br>Following</div>
    </div>
      <div class="button-group">
        <a href="EditProfile.html" style="text-decoration: none; flex: 1;">
            <button class="btn edit-btn" style="width: 100%;">Edit Profile</button>
        </a>
    </div>
    <div class="tab-bar">
        <div>🖼️</div>
        <div>🎬</div>
    </div>

</body>
</html>
