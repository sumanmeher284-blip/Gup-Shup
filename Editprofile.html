<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile</title>
    <style>
        body { 
            font-family: sans-serif; 
            margin: 0; 
            padding: 20px; 
            background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%); 
            min-height: 100vh;
            display: flex;
            justify-content: center; /* पूरा फॉर्म बीच में */
        }

        .edit-container { 
            width: 100%;
            max-width: 400px; /* चौड़ाई फिक्स रखी है */
            margin-top: 20px;
        }

        h2 { text-align: center; color: #333; margin-bottom: 25px; }

        input, textarea { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border: none; 
            border-radius: 50px; 
            box-sizing: border-box; /* ये जरूरी है ताकि पैडिंग से बॉक्स बाहर न जाए */
            outline: none;
            background: rgba(255, 255, 255, 0.7);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        
        textarea { border-radius: 20px; }
        
        button { 
            width: 100%; 
            padding: 15px; 
            background: #007BFF; 
            color: white; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="edit-container">
        <h2>Edit Profile</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="text" id="name" placeholder="Name">
        <textarea id="bio" placeholder="Bio" rows="3"></textarea>
        <button onclick="saveProfile()">Save Changes</button>
    </div>
    <script>
        function saveProfile() {
            localStorage.setItem('user_name', document.getElementById('username').value);
            localStorage.setItem('full_name', document.getElementById('name').value);
            localStorage.setItem('user_bio', document.getElementById('bio').value);
            window.location.href = 'Profile.html';
        }
    </script>
</body>
</html>
