    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GupShup Creator</title>
    <style>
        body { margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; background: #f0f2f5; }
        #camera-section { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .controls { padding: 20px; background: white; display: flex; justify-content: space-around; }
        button { padding: 15px 25px; border-radius: 8px; border: none; background: #007bff; color: white; cursor: pointer; font-weight: bold; }
        #fileInput { display: none; }
    </style>
</head>
<body>

    <div id="camera-section">
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="controls">
        <button onclick="startCamera()">📷 Camera</button>
        <button onclick="document.getElementById('fileInput').click()">🖼️ Gallery</button>
        <input type="file" id="fileInput" accept="image/*">
        <button onclick="sendPost()" style="background: #28a745;">🚀 Send</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAsyouU408rqDSJJDQjvxFNur7d65JH5pw",
            authDomain: "gupshup-b77df.firebaseapp.com",
            projectId: "gupshup-b77df",
            storageBucket: "gupshup-b77df.firebasestorage.app",
            messagingSenderId: "28255695821",
            appId: "1:28255695821:web:02a4ce1d86e9bae5360a84"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // Camera access
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('video').srcObject = stream;
            } catch (err) { alert("Camera access denied!"); }
        }
        window.startCamera = startCamera;
        startCamera();

        // Send post
        window.sendPost = async () => {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];

            if (!file) {
                alert("Please select a photo from gallery!");
                return;
            }

            try {
                const storageRef = ref(storage, 'posts/' + Date.now() + '.jpg');
                await uploadBytes(storageRef, file);
                const imageUrl = await getDownloadURL(storageRef);

                await addDoc(collection(db, "posts"), {
                    username: "User",
                    imageUrl: imageUrl,
                    timestamp: new Date()
                });

                alert("Post shared successfully!");
                window.location.href = "Home.html";
            } catch (e) {
                console.error(e);
                alert("Error! Check Firebase Storage rules.");
            }
        };
    </script>
</body>
</html>
