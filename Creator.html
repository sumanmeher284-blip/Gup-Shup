<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GupShup Creator</title>
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; background: #f0f2f5; }
        
        /* Camera Preview */
        #camera-section { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Buttons Area */
        .controls { padding: 20px; background: white; display: flex; justify-content: space-around; border-top: 1px solid #ddd; }
        button { padding: 12px 20px; border-radius: 8px; border: none; background: #007bff; color: white; cursor: pointer; font-weight: bold; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div id="camera-section">
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="controls">
        <!-- Camera Button -->
        <button onclick="startCamera()">📷 Camera</button>
        
        <!-- Gallery Button -->
        <button onclick="document.getElementById('fileInput').click()">🖼️ Gallery</button>
        <input type="file" id="fileInput" accept="image/*">
        
        <!-- Send/Upload Button -->
        <button onclick="sendPost()" style="background: #28a745;">🚀 Send</button>
    </div>

    <script type="module">
        // Firebase Setup (अपनी config यहाँ डालें)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            projectId: "YOUR_PROJECT_ID"
            // बाकी कॉन्फ़िगरेशन जोड़ें
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Camera Function
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('video').srcObject = stream;
            } catch (err) { alert("Camera access denied!"); }
        }
        window.startCamera = startCamera;
        startCamera();

        // Send Post Function
        window.sendPost = async function() {
            try {
                await addDoc(collection(db, "posts"), {
                    username: "User",
                    imageUrl: "https://via.placeholder.com/300", // यहाँ इमेज URL लॉजिक आएगा
                    timestamp: new Date()
                });
                alert("Post Sent Successfully!");
                window.location.href = "Home.html"; // पोस्ट के बाद होम पर भेजें
            } catch (e) { alert("Error sending post!"); }
        }
    </script>
</body>
</html>
