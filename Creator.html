<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GupShup Creator</title>
    <style>
        body { margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; background: #000; }
        #camera-section { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        #video, #canvas { width: 100%; height: 100%; object-fit: cover; }
        #canvas { display: none; } /* यह फोटो कैप्चर होने के बाद दिखेगा */
        .controls { padding: 20px; background: white; display: flex; justify-content: space-around; }
        button { padding: 15px; border-radius: 50px; border: none; background: #007bff; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div id="camera-section">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <button onclick="capturePhoto()">📷 Capture</button>
        <button onclick="sendPost()" style="background: #28a745;">🚀 Send</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        
        // Firebase Config (यहाँ अपनी कीज जरूर डालें)
        const firebaseConfig = { apiKey: "...", projectId: "...", ... };
        const db = getFirestore(initializeApp(firebaseConfig));

        // 1. Camera Start
        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
        }
        startCamera();

        // 2. Photo Capture Function
        window.capturePhoto = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            video.style.display = 'none'; // वीडियो छुपाएं
            canvas.style.display = 'block'; // फोटो दिखाएं
        };

        // 3. Send/Upload Function
        window.sendPost = async () => {
            const imageData = canvas.toDataURL('image/png'); // फोटो को डेटा में बदलें
            try {
                await addDoc(collection(db, "posts"), {
                    username: "User",
                    imageUrl: imageData, // यह फोटो का डेटा है
                    timestamp: new Date()
                });
                alert("Post Sent!");
                window.location.href = "Home.html";
            } catch (e) { alert("Error sending!"); }
        };
    </script>
</body>
</html>
